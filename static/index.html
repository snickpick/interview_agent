<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview Bot</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f0f23;
        --card: #1a1a3e;
        --primary: #6c63ff;
        --accent: #ff6584;
        --success: #00c9a7;
        --warning: #ffc107;
        --danger: #ff4757;
        --text: #e8e8f0;
        --text-dim: #8888aa;
        --radius: 16px;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      body {
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-image:
          radial-gradient(
            ellipse at 20% 50%,
            rgba(108, 99, 255, 0.08) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse at 80% 50%,
            rgba(255, 101, 132, 0.08) 0%,
            transparent 60%
          );
      }

      .hidden {
        display: none !important;
      }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    width: 640px;
    max-width: 94vw;
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

      /* ─── Bot Avatar ─── */
  .bot-avatar {
    width: 100px;
    height: 100px;
    position: relative;
    flex-shrink: 0;
    margin: 0 auto;
  }
  .bot-head {
    width: 100px;
    height: 100px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    border-radius: 50%;
    position: relative;
    box-shadow: 0 8px 30px rgba(108,99,255,0.35);
    animation: float 3s ease-in-out infinite;
    display: flex;
    align-items: center;
    justify-content: center;
  }
      .bot-head {
        width: 90px;
        height: 90px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        border-radius: 50%;
        position: relative;
        box-shadow: 0 8px 30px rgba(108, 99, 255, 0.35);
        animation: float 3s ease-in-out infinite;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      .bot-antenna {
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        width: 3px;
        height: 14px;
        background: var(--primary);
        border-radius: 2px;
        z-index: 2;
      }
      .bot-antenna::after {
        content: "";
        position: absolute;
        top: -7px;
        left: -5px;
        width: 13px;
        height: 13px;
        background: var(--accent);
        border-radius: 50%;
        animation: glow 2s ease-in-out infinite;
      }
      @keyframes glow {
        0%,
        100% {
          box-shadow: 0 0 6px var(--accent);
        }
        50% {
          box-shadow:
            0 0 16px var(--accent),
            0 0 30px rgba(255, 101, 132, 0.4);
        }
      }
      .bot-eye {
        width: 14px;
        height: 16px;
        background: white;
        border-radius: 50%;
        position: absolute;
        top: 32px;
      }
      .bot-eye::after {
        content: "";
        width: 8px;
        height: 8px;
        background: #222;
        border-radius: 50%;
        position: absolute;
        top: 4px;
        left: 3px;
      }
      .bot-eye.left {
        left: 22px;
      }
      .bot-eye.right {
        right: 22px;
      }
      .bot-mouth {
        position: absolute;
        bottom: 22px;
        left: 50%;
        transform: translateX(-50%);
        width: 20px;
        height: 3px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 4px;
        transition: all 0.3s;
      }
      .bot-mouth.speaking {
        height: 10px;
        border-radius: 5px;
        background: rgba(255, 255, 255, 0.95);
        animation: speakAnim 0.3s infinite alternate;
      }
      @keyframes speakAnim {
        0% {
          height: 4px;
          width: 16px;
        }
        100% {
          height: 12px;
          width: 22px;
        }
      }
      .bot-body {
        width: 40px;
        height: 16px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        border-radius: 0 0 8px 8px;
        margin: -4px auto 0;
        opacity: 0.6;
      }

  /* ─── Welcome Screen ─── */
  #welcome {
    padding: 48px 40px 36px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }
      #welcome h1 {
        font-size: 1.75rem;
        font-weight: 750;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.3px;
      }
      #welcome p {
        color: var(--text-dim);
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .input-group {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .input-group input {
        width: 100%;
        padding: 14px 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        font-size: 0.95rem;
        outline: none;
        transition: border 0.2s;
      }
      .input-group input:focus {
        border-color: var(--primary);
      }
      .input-group input::placeholder {
        color: var(--text-dim);
      }
      .input-group input[type="number"] {
        -moz-appearance: textfield;
      }
      .input-group input[type="number"]::-webkit-inner-spin-button,
      .input-group input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .input-row {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
      }
      .input-row .input-label {
        font-size: 0.85rem;
        color: var(--text-dim);
        white-space: nowrap;
        font-weight: 500;
      }
      .input-row input {
        flex: 1;
        padding: 14px 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        font-size: 0.95rem;
        outline: none;
        transition: border 0.2s;
        text-align: center;
        min-width: 0;
      }
      .input-row input:focus {
        border-color: var(--primary);
      }
      .input-row .input-hint {
        font-size: 0.78rem;
        color: var(--text-dim);
        white-space: nowrap;
        opacity: 0.7;
      }

      .btn {
        padding: 14px 32px;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        width: 100%;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--primary), #5a52e0);
        color: white;
        box-shadow: 0 4px 16px rgba(108, 99, 255, 0.3);
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(108, 99, 255, 0.45);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      .btn-secondary {
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
      }

  /* ─── Interview Screen ─── */
  #interview {
    display: flex;
    flex-direction: column;
    height: 82vh;
    max-height: 760px;
  }

      .interview-header {
        padding: 16px 20px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        flex-shrink: 0;
      }
      .interview-header .top-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .interview-header .bot-info {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .interview-header .bot-info .mini-avatar {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        border-radius: 50%;
        flex-shrink: 0;
        position: relative;
      }
      .interview-header .bot-info .mini-avatar .mini-eye {
        width: 6px;
        height: 7px;
        background: white;
        border-radius: 50%;
        position: absolute;
        top: 12px;
      }
      .interview-header .bot-info .mini-avatar .mini-eye::after {
        content: "";
        width: 3px;
        height: 3px;
        background: #222;
        border-radius: 50%;
        position: absolute;
        top: 2px;
        left: 1.5px;
      }
      .interview-header .bot-info .mini-avatar .mini-eye.le {
        left: 9px;
      }
      .interview-header .bot-info .mini-avatar .mini-eye.ri {
        right: 9px;
      }
      .interview-header .bot-info .bot-name {
        font-weight: 600;
        font-size: 0.9rem;
      }
      .interview-header .bot-info .bot-status {
        font-size: 0.75rem;
        color: var(--success);
      }
      .question-counter {
        font-size: 0.8rem;
        color: var(--text-dim);
      }
      .progress-wrap {
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 4px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--primary), var(--accent));
        border-radius: 4px;
        transition: width 0.4s ease;
        width: 0%;
      }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
      .chat-area::-webkit-scrollbar {
        width: 4px;
      }
      .chat-area::-webkit-scrollbar-track {
        background: transparent;
      }
      .chat-area::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }

      .msg {
        display: flex;
        gap: 10px;
        max-width: 88%;
        animation: msgIn 0.3s ease;
      }
      @keyframes msgIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .msg.bot {
        align-self: flex-start;
      }
      .msg.user {
        align-self: flex-end;
        flex-direction: row-reverse;
      }

      .msg .msg-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        flex-shrink: 0;
        margin-top: 4px;
      }
      .msg.bot .msg-avatar {
        background: linear-gradient(135deg, var(--primary), var(--accent));
        position: relative;
      }
      .msg.bot .msg-avatar::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 12px;
        height: 12px;
        background: white;
        clip-path: polygon(0 0, 100% 0, 50% 100%);
        opacity: 0.6;
      }
      .msg.user .msg-avatar {
        background: linear-gradient(135deg, #4a4a8a, #6a6aaa);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        color: white;
        font-weight: 600;
      }

  .msg .bubble {
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 0.95rem;
    line-height: 1.6;
    word-wrap: break-word;
  }
      .msg.bot .bubble {
        background: rgba(255, 255, 255, 0.06);
        border-bottom-left-radius: 4px;
      }
      .msg.user .bubble {
        background: rgba(108, 99, 255, 0.2);
        border-bottom-right-radius: 4px;
      }
      .msg .bubble .score-badge {
        display: inline-block;
        margin-top: 8px;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .score-badge.high {
        background: rgba(0, 201, 167, 0.2);
        color: var(--success);
      }
      .score-badge.med {
        background: rgba(255, 193, 7, 0.2);
        color: var(--warning);
      }
      .score-badge.low {
        background: rgba(255, 71, 87, 0.2);
        color: var(--danger);
      }

      .typing-indicator {
        display: flex;
        gap: 4px;
        padding: 4px 0;
      }
      .typing-indicator span {
        width: 8px;
        height: 8px;
        background: var(--text-dim);
        border-radius: 50%;
        animation: typing 1.4s infinite both;
      }
      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes typing {
        0%,
        60%,
        100% {
          opacity: 0.3;
          transform: translateY(0);
        }
        30% {
          opacity: 1;
          transform: translateY(-4px);
        }
      }

  .input-area {
    padding: 14px 20px 18px;
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-area textarea {
    flex: 1;
    padding: 14px 18px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 48px;
    max-height: 120px;
    transition: border 0.2s;
  }
      .input-area textarea:focus {
        border-color: var(--primary);
      }
      .input-area textarea::placeholder {
        color: var(--text-dim);
      }

  .mic-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    font-size: 1.4rem;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
  }
      .mic-btn:hover {
        border-color: var(--primary);
        background: rgba(108, 99, 255, 0.1);
      }
      .mic-btn.recording {
        border-color: var(--danger);
        background: rgba(255, 71, 87, 0.15);
        color: var(--danger);
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4);
        }
        50% {
          box-shadow: 0 0 0 12px rgba(255, 71, 87, 0);
        }
      }
  .send-btn {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--primary), #5a52e0);
    color: white;
    font-size: 1.3rem;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
      .send-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 16px rgba(108, 99, 255, 0.4);
      }
      .send-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      /* ─── Result Screen ─── */
      #result {
        padding: 40px 36px 32px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      #result .bot-avatar {
        width: 80px;
        height: 80px;
      }
      #result .bot-avatar .bot-head {
        width: 80px;
        height: 80px;
      }

      .score-ring {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        margin: 8px 0;
        position: relative;
      }
      .score-ring svg {
        position: absolute;
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
      }
      .score-ring .bg-circle {
        fill: none;
        stroke: rgba(255, 255, 255, 0.06);
        stroke-width: 6;
      }
      .score-ring .progress-circle {
        fill: none;
        stroke: var(--primary);
        stroke-width: 6;
        stroke-linecap: round;
        transition: stroke-dashoffset 1s ease;
      }
      .score-ring .score-value {
        font-size: 2.8rem;
        font-weight: 800;
        line-height: 1;
      }
      .score-ring .score-value.best {
        color: var(--success);
      }
      .score-ring .score-value.fit {
        color: var(--warning);
      }
      .score-ring .score-value.nope {
        color: var(--danger);
      }
      .score-ring .score-label {
        font-size: 0.75rem;
        color: var(--text-dim);
      }

      .fit-badge {
        display: inline-block;
        padding: 6px 20px;
        border-radius: 20px;
        font-weight: 700;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .fit-badge.best {
        background: rgba(0, 201, 167, 0.15);
        color: var(--success);
        border: 1px solid rgba(0, 201, 167, 0.3);
      }
      .fit-badge.fit {
        background: rgba(255, 193, 7, 0.12);
        color: var(--warning);
        border: 1px solid rgba(255, 193, 7, 0.25);
      }
      .fit-badge.nope {
        background: rgba(255, 71, 87, 0.12);
        color: var(--danger);
        border: 1px solid rgba(255, 71, 87, 0.25);
      }

      .result-details {
        width: 100%;
        text-align: left;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .result-details h3 {
        font-size: 0.85rem;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 4px;
      }
      .result-details ul {
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .result-details ul li {
        padding: 5px 12px;
        border-radius: 8px;
        font-size: 0.82rem;
      }
      .result-details ul li.strength {
        background: rgba(0, 201, 167, 0.12);
        color: var(--success);
        border: 1px solid rgba(0, 201, 167, 0.15);
      }
      .result-details ul li.weakness {
        background: rgba(255, 71, 87, 0.1);
        color: var(--danger);
        border: 1px solid rgba(255, 71, 87, 0.12);
      }
      .result-details .summary-text {
        font-size: 0.9rem;
        line-height: 1.6;
        color: var(--text);
        opacity: 0.9;
      }

      .scroll-fade {
        mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
        -webkit-mask-image: linear-gradient(
          to bottom,
          black 90%,
          transparent 100%
        );
      }
    </style>
  </head>
  <body>
    <div class="card" id="app">
      <!-- ─── WELCOME ─── -->
      <div id="welcome">
        <div class="bot-avatar">
          <div class="bot-head">
            <div class="bot-antenna"></div>
            <div class="bot-eye left"></div>
            <div class="bot-eye right"></div>
            <div class="bot-mouth"></div>
          </div>
          <div class="bot-body"></div>
        </div>
        <h1>Interview Bot</h1>
        <p>
          Your AI-powered interview assistant. Get evaluated on any topic with
          real-time speech.
        </p>
        <div class="input-group">
          <input
            id="nameInput"
            type="text"
            placeholder="Your name"
            autocomplete="name"
          />
          <input
            id="topicInput"
            type="text"
            placeholder="Interview topic (e.g., Python, Machine Learning, DevOps)"
            autocomplete="off"
          />
          <div class="input-row">
            <label class="input-label" for="numQuestionsInput">Questions</label>
            <input
              id="numQuestionsInput"
              type="number"
              min="1"
              max="500"
              value="10"
            />
            <span class="input-hint" id="qCountHint">10 total</span>
          </div>
        </div>
        <button
          class="btn btn-primary"
          id="startBtn"
          onclick="startInterview()"
        >
          Start Interview
        </button>
      </div>

      <!-- ─── INTERVIEW ─── -->
      <div id="interview" class="hidden">
        <div class="interview-header">
          <div class="top-row">
            <div class="bot-info">
              <div class="mini-avatar">
                <div class="mini-eye le"></div>
                <div class="mini-eye ri"></div>
              </div>
              <div>
                <div class="bot-name">Interview Bot</div>
                <div class="bot-status" id="botStatus">&#9679; Speaking</div>
              </div>
            </div>
            <div class="question-counter" id="questionCounter">0 / 10</div>
          </div>
          <div class="progress-wrap">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="input-area">
          <button
            class="mic-btn"
            id="micBtn"
            onclick="toggleMic()"
            title="Hold to speak"
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" y1="19" x2="12" y2="23" />
              <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
          </button>
          <textarea
            id="answerInput"
            placeholder="Type your answer or use the mic..."
            rows="1"
            oninput="autoResize(this)"
          ></textarea>
          <button
            class="send-btn"
            id="sendBtn"
            onclick="submitAnswer()"
            disabled
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </div>
      </div>

      <!-- ─── RESULT ─── -->
      <div id="result" class="hidden">
        <div class="bot-avatar">
          <div class="bot-head">
            <div class="bot-antenna"></div>
            <div class="bot-eye left"></div>
            <div class="bot-eye right"></div>
            <div class="bot-mouth"></div>
          </div>
          <div class="bot-body"></div>
        </div>
        <h2>Interview Complete!</h2>

        <div class="score-ring" id="scoreRing">
          <svg viewBox="0 0 120 120">
            <circle class="bg-circle" cx="60" cy="60" r="52" />
            <circle
              class="progress-circle"
              id="scoreCircle"
              cx="60"
              cy="60"
              r="52"
              stroke-dasharray="326.73"
              stroke-dashoffset="326.73"
            />
          </svg>
          <div>
            <div class="score-value" id="scoreValue">0</div>
            <div class="score-label">out of 100</div>
          </div>
        </div>

        <div class="fit-badge" id="fitBadge">—</div>

        <div class="result-details" id="resultDetails">
          <div>
            <h3>&#9733; Strengths</h3>
            <ul id="strengthsList"></ul>
          </div>
          <div>
            <h3>&#9888; Areas to Improve</h3>
            <ul id="weaknessesList"></ul>
          </div>
          <div>
            <h3>&#128220; Summary</h3>
            <p class="summary-text" id="summaryText"></p>
          </div>
        </div>

        <button
          class="btn btn-secondary"
          onclick="location.reload()"
          style="margin-top: 4px"
        >
          &#8592; New Interview
        </button>
      </div>
    </div>

    <script>
      // ─── State ───
      const S = {
        sessionId: null,
        questionIdx: 0,
        totalQuestions: 10,
        name: "",
        topic: "",
        isRecording: false,
        recognition: null,
        awaitingAnswer: false,
        isComplete: false,
        isProcessing: false,
      };

      const $ = (id) => document.getElementById(id);
      const chatArea = $("chatArea");

      $("numQuestionsInput").addEventListener("input", function () {
        const val = Math.max(1, Math.min(500, parseInt(this.value) || 10));
        this.value = val;
        $("qCountHint").textContent = val + " total";
      });

      // ─── TTS ───
      let ttsVoices = [];
      function loadVoices() {
        ttsVoices = speechSynthesis.getVoices();
      }
      loadVoices();
      if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
      }

      function speakText(text, onEnd) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 1.0;
        u.pitch = 1.05;
        const preferred = ttsVoices.find(
          (v) =>
            v.name.includes("Google UK") ||
            v.name.includes("Samantha") ||
            v.name.includes("Microsoft") ||
            v.lang.startsWith("en"),
        );
        if (preferred) u.voice = preferred;
        u.onend = () => {
          if (onEnd) onEnd();
        };
        u.onerror = () => {
          if (onEnd) onEnd();
        };
        speechSynthesis.speak(u);
        return u;
      }

      // ─── Speech Recognition ───
      const SpeechRec =
        window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SpeechRec) {
        S.recognition = new SpeechRec();
        S.recognition.continuous = false;
        S.recognition.interimResults = true;
        S.recognition.lang = "en-US";
        S.recognition.onresult = function (e) {
          let interim = "",
            final = "";
          for (let i = e.resultIndex; i < e.results.length; i++) {
            if (e.results[i].isFinal) final += e.results[i][0].transcript;
            else interim += e.results[i][0].transcript;
          }
          if (final) {
            const ta = $("answerInput");
            ta.value = (ta.value ? ta.value + " " : "") + final;
            autoResize(ta);
            $("sendBtn").disabled = false;
          }
        };
        S.recognition.onend = function () {
          S.isRecording = false;
          $("micBtn").classList.remove("recording");
          $("micBtn").title = "Hold to speak";
        };
        S.recognition.onerror = function () {
          S.isRecording = false;
          $("micBtn").classList.remove("recording");
          $("micBtn").title = "Hold to speak";
        };
      }

      function toggleMic() {
        if (!S.recognition)
          return alert(
            "Speech recognition not supported. Please type your answer.",
          );
        if (S.isRecording) {
          S.recognition.stop();
        } else {
          S.recognition.start();
          S.isRecording = true;
          $("micBtn").classList.add("recording");
          $("micBtn").title = "Stop recording";
        }
      }

      // ─── Helpers ───
      function autoResize(el) {
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 100) + "px";
        $("sendBtn").disabled = !el.value.trim();
      }

      function addMessage(type, html) {
        const div = document.createElement("div");
        div.className = "msg " + type;
        if (type === "bot") {
          div.innerHTML =
            '<div class="msg-avatar"></div><div class="bubble">' +
            html +
            "</div>";
        } else {
          const initial = S.name.charAt(0).toUpperCase() || "U";
          div.innerHTML =
            '<div class="msg-avatar">' +
            initial +
            '</div><div class="bubble">' +
            html +
            "</div>";
        }
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
      }

      function showTyping() {
        const div = document.createElement("div");
        div.className = "msg bot";
        div.id = "typingIndicator";
        div.innerHTML =
          '<div class="msg-avatar"></div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
      }

      function removeTyping() {
        const el = document.getElementById("typingIndicator");
        if (el) el.remove();
      }

      function setProgress() {
        const pct =
          S.totalQuestions > 0 ? (S.questionIdx / S.totalQuestions) * 100 : 0;
        $("progressBar").style.width = pct + "%";
        $("questionCounter").textContent =
          S.questionIdx + " / " + S.totalQuestions;
      }

      function botMouthSpeak(on) {
        const mouths = document.querySelectorAll(".bot-mouth");
        mouths.forEach((m) => m.classList.toggle("speaking", on));
        const status = $("botStatus");
        if (on) {
          status.textContent = "\u25cf Speaking";
          status.style.color = "var(--accent)";
        } else {
          status.textContent = "\u25cf Listening";
          status.style.color = "var(--success)";
        }
      }

      // ─── Start Interview ───
      async function startInterview() {
        const name = $("nameInput").value.trim();
        const topic = $("topicInput").value.trim();
        if (!name || !topic) return;

        $("startBtn").disabled = true;
        $("startBtn").textContent = "Starting...";

        try {
          const numQuestions = parseInt($("numQuestionsInput").value) || 10;
          const res = await fetch("/api/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, topic, num_questions: numQuestions }),
          });
          const data = await res.json();
          if (data.error) {
            alert(data.error);
            $("startBtn").disabled = false;
            $("startBtn").textContent = "Start Interview";
            return;
          }

          S.sessionId = data.session_id;
          S.name = data.name;
          S.topic = data.topic;
          S.totalQuestions = data.total_questions;
          S.questionIdx = 0;

          $("welcome").classList.add("hidden");
          $("interview").classList.remove("hidden");
          setProgress();

          // Greeting
          const greeting = `Hello ${S.name}! I'll be interviewing you about ${S.topic}. Let's begin with the first question.`;
          addMessage("bot", greeting);
          botMouthSpeak(true);
          speakText(greeting, () => {
            botMouthSpeak(false);
            // ask first question
            askQuestion(data.question);
          });
        } catch (e) {
          alert("Failed to start interview: " + e.message);
          $("startBtn").disabled = false;
          $("startBtn").textContent = "Start Interview";
        }
      }

      function askQuestion(question) {
        S.awaitingAnswer = true;
        addMessage("bot", question);
        botMouthSpeak(true);
        speakText(question, () => {
          botMouthSpeak(false);
          $("answerInput").focus();
        });
        chatArea.scrollTop = chatArea.scrollHeight;
      }

      // ─── Submit Answer ───
      async function submitAnswer() {
        if (S.isProcessing || !S.awaitingAnswer) return;
        const text = $("answerInput").value.trim();
        if (!text) return;

        S.isProcessing = true;
        S.awaitingAnswer = false;
        $("sendBtn").disabled = true;
        $("answerInput").disabled = true;

        // Show user message
        addMessage("user", text);
        $("answerInput").value = "";
        autoResize($("answerInput"));

        // Show typing indicator
        showTyping();

        try {
          const res = await fetch("/api/answer", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: S.sessionId, answer: text }),
          });
          const data = await res.json();
          removeTyping();

          if (data.error) {
            addMessage("bot", "Error: " + data.error);
            S.isProcessing = false;
            $("answerInput").disabled = false;
            return;
          }

          // Show feedback with score
          const score = data.score;
          let badgeClass = "high";
          if (score < 5) badgeClass = "low";
          else if (score < 8) badgeClass = "med";
          const feedbackHtml = `${data.feedback} <span class="score-badge ${badgeClass}">Score: ${score}/10</span>`;
          addMessage("bot", feedbackHtml);
          botMouthSpeak(true);
          speakText(data.feedback, () => {
            botMouthSpeak(false);
          });

          if (data.done) {
            S.isComplete = true;
            S.questionIdx = data.total_questions;
            setProgress();
            setTimeout(() => showResults(data), 1200);
          } else {
            S.questionIdx = data.question_idx;
            setProgress();
            // Next question after delay
            setTimeout(() => {
              askQuestion(data.next_question);
              S.isProcessing = false;
              $("answerInput").disabled = false;
              $("answerInput").focus();
            }, 1800);
          }
        } catch (e) {
          removeTyping();
          addMessage("bot", "Network error. Please try again.");
          S.isProcessing = false;
          $("answerInput").disabled = false;
        }
      }

      // ─── Enter to send ───
      document.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          const ta = $("answerInput");
          if (
            document.activeElement === ta &&
            ta.value.trim() &&
            !$("sendBtn").disabled
          ) {
            e.preventDefault();
            submitAnswer();
          }
        }
      });

      // ─── Results ───
      function showResults(data) {
        $("interview").classList.add("hidden");
        $("result").classList.remove("hidden");

        const total = data.total_score;
        const fit = data.fit;

        // Score ring animation
        const circle = $("scoreCircle");
        const circumference = 326.73;
        const offset = circumference - (total / 100) * circumference;
        setTimeout(() => {
          circle.style.strokeDashoffset = offset;
        }, 100);

        const sv = $("scoreValue");
        sv.textContent = total;
        if (fit === "Best Fit") sv.className = "score-value best";
        else if (fit === "Fit") sv.className = "score-value fit";
        else sv.className = "score-value nope";

        // Fit badge
        const fb = $("fitBadge");
        fb.textContent = fit;
        if (fit === "Best Fit") fb.className = "fit-badge best";
        else if (fit === "Fit") fb.className = "fit-badge fit";
        else fb.className = "fit-badge nope";

        // Score ring color
        const pc = $("scoreCircle");
        if (fit === "Best Fit") pc.style.stroke = "var(--success)";
        else if (fit === "Fit") pc.style.stroke = "var(--warning)";
        else pc.style.stroke = "var(--danger)";

        // Strengths
        const sl = $("strengthsList");
        sl.innerHTML = "";
        (data.strengths || []).forEach((s) => {
          const li = document.createElement("li");
          li.className = "strength";
          li.textContent = s;
          sl.appendChild(li);
        });

        // Weaknesses
        const wl = $("weaknessesList");
        wl.innerHTML = "";
        (data.weaknesses || []).forEach((w) => {
          const li = document.createElement("li");
          li.className = "weakness";
          li.textContent = w;
          wl.appendChild(li);
        });

        // Summary
        $("summaryText").textContent = data.summary || "";

        // Play final message
        const endMsg =
          fit === "Best Fit"
            ? "Excellent work! You are a best fit for this role."
            : fit === "Fit"
              ? "Good job! You are fit for this role."
              : "Thank you for your time. Review the feedback and keep learning.";
        setTimeout(() => {
          botMouthSpeak(true);
          speakText(endMsg, () => botMouthSpeak(false));
        }, 600);
      }
    </script>
  </body>
</html>
